services:
  prometheus:
    image: prom/prometheus:latest
    container_name: scuad-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - /data/monitoring/prometheus:/prometheus
    ports:
      - "9090:9090"
    networks:
      - scuad-monitoring-network

networks:
  scuad-monitoring-network:
    external: true
