# AI Pods for development environment
# $ kubectl create secret generic ai-shared-secret --from-env-file=.env.ai -n dev

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-api
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-api
  template:
    metadata:
      labels:
        app: ai-api
        tier: backend
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: api
          image: 209192769586.dkr.ecr.ap-northeast-2.amazonaws.com/scuad-ai-api:develop-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ai-shared-secret
---
apiVersion: v1
kind: Service
metadata:
  name: ai-api
  namespace: dev
spec:
  selector:
    app: ai-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
