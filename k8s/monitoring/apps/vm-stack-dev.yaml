apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vm-stack-dev
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
    notifications.argoproj.io/subscribe.on-health-degraded.discord: ""
spec:
  project: default
  sources:
    - repoURL: "https://victoriametrics.github.io/helm-charts/"
      chart: victoria-metrics-k8s-stack
      targetRevision: "0.72.*"
      helm:
        releaseName: vm-stack
        valueFiles:
          - $values/k8s/monitoring/values/victoria-metrics-k8s-stack/values-dev.yaml
    - repoURL: "https://github.com/100-hours-a-week/11-team-service-cloud.git"
      targetRevision: develop
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
