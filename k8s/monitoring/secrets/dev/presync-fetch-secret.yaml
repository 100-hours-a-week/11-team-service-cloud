apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring-secret-fetcher
  namespace: monitoring
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-secret-fetcher
  namespace: monitoring
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitoring-secret-fetcher
  namespace: monitoring
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
  - kind: ServiceAccount
    name: monitoring-secret-fetcher
roleRef:
  kind: Role
  name: monitoring-secret-fetcher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: monitoring-fetch-secret
  namespace: monitoring
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: monitoring-secret-fetcher
      containers:
        - name: fetch
          image: amazon/aws-cli:latest
          env:
            - name: AWS_DEFAULT_REGION
              value: ap-northeast-2
          command:
            - /bin/sh
            - -c
            - |
              SECRET_NAME="monitoring-secret"
              NS="monitoring"

              # Fetch Grafana admin password
              GRAFANA_PW=$(aws ssm get-parameter \
                --name "/scuad/v3/dev/monitoring/GRAFANA_ADMIN_PASSWORD" \
                --with-decryption \
                --query "Parameter.Value" \
                --output text)
              GRAFANA_PW_B64=$(echo -n "$GRAFANA_PW" | base64 | tr -d '\n')

              # Fetch Discord webhook URL
              DISCORD_URL=$(aws ssm get-parameter \
                --name "/scuad/v3/dev/monitoring/DISCORD_WEBHOOK_URL" \
                --with-decryption \
                --query "Parameter.Value" \
                --output text)
              DISCORD_URL_B64=$(echo -n "$DISCORD_URL" | base64 | tr -d '\n')

              # Default Grafana admin user
              GRAFANA_USER_B64=$(echo -n "admin" | base64 | tr -d '\n')

              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              API="https://kubernetes.default.svc"

              curl -sk -X PATCH \
                --cacert "$CACERT" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/apply-patch+yaml" \
                "$API/api/v1/namespaces/$NS/secrets/$SECRET_NAME?fieldManager=secret-fetcher&force=true" \
                -d "{
                  \"apiVersion\": \"v1\",
                  \"kind\": \"Secret\",
                  \"metadata\": {\"name\": \"$SECRET_NAME\", \"namespace\": \"$NS\"},
                  \"data\": {
                    \"grafana-admin-user\": \"$GRAFANA_USER_B64\",
                    \"grafana-admin-password\": \"$GRAFANA_PW_B64\",
                    \"discord-webhook-url\": \"$DISCORD_URL_B64\"
                  }
                }"
      restartPolicy: Never
  backoffLimit: 3
