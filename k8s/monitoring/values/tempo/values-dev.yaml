# Grafana Tempo Monolithic - Dev Environment
# Helm chart: grafana-community/tempo 1.24.4
# App version: v2.10.3

tempo:
  repository: grafana/tempo
  tag: "2.10.3"
  pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  retention: 168h  # 7 days

  # Disable unused receivers, enable only OTLP
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  metricsGenerator:
    enabled: false

  reportingEnabled: false

  ingester:
    trace_idle_period: 10s
    max_block_duration: 5m
    complete_block_timeout: 15m

  querier:
    max_concurrent_queries: 10

  overrides:
    defaults:
      global:
        max_bytes_per_trace: 5000000  # 5MB

tempoQuery:
  enabled: false

persistence:
  enabled: true
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  size: 20Gi

service:
  type: ClusterIP

serviceMonitor:
  enabled: true
  interval: 30s
  additionalLabels:
    release: victoria-metrics

securityContext:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  runAsNonRoot: true
