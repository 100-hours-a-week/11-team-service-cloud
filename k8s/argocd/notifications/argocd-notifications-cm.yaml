apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # ----------------------------
  # Discord Webhook 서비스
  # ----------------------------
  service.webhook.discord: |
    url: $discord-webhook-url
    headers:
      - name: Content-Type
        value: application/json

  # ----------------------------
  # 알림 템플릿
  # ----------------------------
  template.app-sync-succeeded: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "✅ 배포 성공",
              "description": "**{{.app.metadata.name}}** 배포가 완료되었습니다.",
              "color": 3066993,
              "fields": [
                {"name": "Application", "value": "{{.app.metadata.name}}", "inline": true},
                {"name": "Revision", "value": "{{.app.status.sync.revision | trunc 7}}", "inline": true},
                {"name": "Environment", "value": "{{.app.metadata.namespace}}", "inline": true}
              ],
              "timestamp": "{{.app.status.operationState.finishedAt}}"
            }]
          }

  template.app-sync-failed: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "❌ 동기화 실패",
              "description": "**{{.app.metadata.name}}** 동기화에 실패했습니다.",
              "color": 15158332,
              "fields": [
                {"name": "Application", "value": "{{.app.metadata.name}}", "inline": true},
                {"name": "Revision", "value": "{{.app.status.sync.revision | trunc 7}}", "inline": true},
                {"name": "Message", "value": "{{.app.status.operationState.message | trunc 200}}", "inline": false}
              ],
              "timestamp": "{{.app.status.operationState.finishedAt}}"
            }]
          }

  template.app-health-degraded: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "⚠️ 상태 이상",
              "description": "**{{.app.metadata.name}}** 상태가 Degraded입니다.",
              "color": 16776960,
              "fields": [
                {"name": "Application", "value": "{{.app.metadata.name}}", "inline": true},
                {"name": "Health Status", "value": "{{.app.status.health.status}}", "inline": true},
                {"name": "Sync Status", "value": "{{.app.status.sync.status}}", "inline": true}
              ]
            }]
          }

  # ----------------------------
  # 트리거
  # ----------------------------
  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      send: [app-sync-succeeded]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  # ----------------------------
  # 전체 앱 구독 (트리거 → webhook:discord)
  # ----------------------------
  subscriptions: |
    - recipients:
      - webhook:discord
      triggers:
      - on-sync-succeeded
      - on-sync-failed
      - on-health-degraded

  # ----------------------------
  # 기본 트리거 (전체 앱 자동 적용)
  # ----------------------------
  defaultTriggers: |
    - on-sync-succeeded
    - on-sync-failed
    - on-health-degraded
