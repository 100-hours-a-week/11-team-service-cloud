apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  service.webhook.discord: |
    url: $discord-webhook-url
    headers:
      - name: Content-Type
        value: application/json

  template.app-sync-succeeded: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "Sync Succeeded",
              "description": "**{{.app.metadata.name}}** has been successfully synced.",
              "color": 3066993,
              "fields": [
                {"name": "Application", "value": "{{.app.metadata.name}}", "inline": true},
                {"name": "Namespace", "value": "{{.app.spec.destination.namespace}}", "inline": true},
                {"name": "Revision", "value": "{{.app.status.sync.revision | trunc 7}}", "inline": true}
              ],
              "timestamp": "{{.app.status.operationState.finishedAt}}"
            }]
          }

  template.app-sync-failed: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "Sync Failed",
              "description": "**{{.app.metadata.name}}** sync has failed.",
              "color": 15158332,
              "fields": [
                {"name": "Application", "value": "{{.app.metadata.name}}", "inline": true},
                {"name": "Namespace", "value": "{{.app.spec.destination.namespace}}", "inline": true},
                {"name": "Revision", "value": "{{.app.status.sync.revision | trunc 7}}", "inline": true}
              ],
              "timestamp": "{{.app.status.operationState.finishedAt}}"
            }]
          }

  template.app-health-degraded: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "Health Degraded",
              "description": "**{{.app.metadata.name}}** health status is degraded.",
              "color": 16776960,
              "fields": [
                {"name": "Application", "value": "{{.app.metadata.name}}", "inline": true},
                {"name": "Namespace", "value": "{{.app.spec.destination.namespace}}", "inline": true},
                {"name": "Health Status", "value": "{{.app.status.health.status}}", "inline": true}
              ]
            }]
          }

  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [app-sync-succeeded]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]
