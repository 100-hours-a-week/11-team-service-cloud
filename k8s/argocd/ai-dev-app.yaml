apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-dev
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
    notifications.argoproj.io/subscribe.on-health-degraded.discord: ""
spec:
  project: default
  source:
    repoURL: "https://github.com/100-hours-a-week/11-team-service-cloud.git"
    targetRevision: develop
    path: k8s/apps/ai/overlays/dev
  destination:
    server: "https://kubernetes.default.svc"
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
