apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: ai-dev-updater
  namespace: argocd
spec:
  writeBackConfig:
    method: "git"
    gitConfig:
      branch: "develop"
      writeBackTarget: "kustomization"
  applicationRefs:
    - namePattern: "ai-dev"
      images:
        - alias: "api"
          imageName: "209192769586.dkr.ecr.ap-northeast-2.amazonaws.com/scuad-ai-api"
          commonUpdateSettings:
            updateStrategy: "newest-build"
            allowTags: "regexp:^develop-"
            pullSecret: "pullsecret:argocd/ecr-secret"
        - alias: "worker-resume"
          imageName: "209192769586.dkr.ecr.ap-northeast-2.amazonaws.com/scuad-ai-worker-resume"
          commonUpdateSettings:
            updateStrategy: "newest-build"
            allowTags: "regexp:^develop-"
            pullSecret: "pullsecret:argocd/ecr-secret"
        - alias: "worker-job"
          imageName: "209192769586.dkr.ecr.ap-northeast-2.amazonaws.com/scuad-ai-worker-job"
          commonUpdateSettings:
            updateStrategy: "newest-build"
            allowTags: "regexp:^develop-"
            pullSecret: "pullsecret:argocd/ecr-secret"
        - alias: "worker-evaluate"
          imageName: "209192769586.dkr.ecr.ap-northeast-2.amazonaws.com/scuad-ai-worker-evaluate"
          commonUpdateSettings:
            updateStrategy: "newest-build"
            allowTags: "regexp:^develop-"
            pullSecret: "pullsecret:argocd/ecr-secret"
        - alias: "worker-compare"
          imageName: "209192769586.dkr.ecr.ap-northeast-2.amazonaws.com/scuad-ai-worker-compare"
          commonUpdateSettings:
            updateStrategy: "newest-build"
            allowTags: "regexp:^develop-"
            pullSecret: "pullsecret:argocd/ecr-secret"
