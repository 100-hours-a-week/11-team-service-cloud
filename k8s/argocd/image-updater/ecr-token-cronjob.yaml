apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-token-refresher
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-token-refresher
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-token-refresher
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: ecr-token-refresher
    namespace: argocd
roleRef:
  kind: Role
  name: ecr-token-refresher
  apiGroup: rbac.authorization.k8s.io
---
# ECR 토큰은 12시간마다 만료됨 → 10시간마다 갱신
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-token-refresh
  namespace: argocd
spec:
  schedule: "0 */10 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-token-refresher
          containers:
            - name: refresh
              image: amazon/aws-cli:latest
              command:
                - /bin/sh
                - -c
                - |
                  TOKEN=$(aws ecr get-login-password --region ap-northeast-2)
                  kubectl delete secret ecr-secret -n argocd --ignore-not-found
                  kubectl create secret docker-registry ecr-secret \
                    -n argocd \
                    --docker-server=209192769586.dkr.ecr.ap-northeast-2.amazonaws.com \
                    --docker-username=AWS \
                    --docker-password=$TOKEN
              env:
                - name: AWS_REGION
                  value: ap-northeast-2
          restartPolicy: OnFailure
