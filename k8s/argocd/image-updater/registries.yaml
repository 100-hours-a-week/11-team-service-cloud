apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
data:
  # ECR 레지스트리 설정
  registries.conf: |
    registries:
      - name: ECR
        api_url: https://209192769586.dkr.ecr.ap-northeast-2.amazonaws.com
        prefix: 209192769586.dkr.ecr.ap-northeast-2.amazonaws.com
        credentials: pullsecret:argocd/ecr-secret
        default: true
        insecure: false

  # Git write-back 설정
  git.commit-message-template: |
    chore: update image {{ .AppName }} to {{ .NewTag }}

    {{ range .AppChanges }}
    - {{ .Image }}: {{ .OldTag }} → {{ .NewTag }}
    {{ end }}

  log.level: info
