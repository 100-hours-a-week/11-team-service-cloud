apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-secret-fetcher
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-secret-fetcher
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-secret-fetcher
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
  - kind: ServiceAccount
    name: backend-secret-fetcher
roleRef:
  kind: Role
  name: backend-secret-fetcher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: backend-fetch-secret
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: backend-secret-fetcher
      containers:
        - name: fetch
          image: amazon/aws-cli:latest
          env:
            - name: AWS_DEFAULT_REGION
              value: ap-northeast-2
          command:
            - /bin/sh
            - -c
            - |
              SECRET_NAME="spring-secret"
              PARAM_NAME="/scuad/v3/prod/be/DOT_ENV"

              VALUE=$(aws ssm get-parameter --name "$PARAM_NAME" --with-decryption --query "Parameter.Value" --output text)
              ENCODED=$(echo -n "$VALUE" | base64 | tr -d '\n')

              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              API="https://kubernetes.default.svc"
              NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)

              curl -sk -X PATCH \
                --cacert "$CACERT" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/apply-patch+yaml" \
                "$API/api/v1/namespaces/$NS/secrets/$SECRET_NAME?fieldManager=secret-fetcher&force=true" \
                -d "{
                  \"apiVersion\": \"v1\",
                  \"kind\": \"Secret\",
                  \"metadata\": {\"name\": \"$SECRET_NAME\", \"namespace\": \"$NS\"},
                  \"data\": {\"DOT_ENV\": \"$ENCODED\"}
                }"
      restartPolicy: Never
  backoffLimit: 3
