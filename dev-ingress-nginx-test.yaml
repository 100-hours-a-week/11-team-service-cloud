# Test workloads + services + ingress for kubeadm + ingress-nginx (NodePort 30080)
# Namespace: dev
# Routes:
#   /     -> svc/web:80
#   /api  -> svc/spring:8080
# Apply:
#   kubectl apply -f dev-ingress-nginx-test.yaml
# Verify (inside cluster / on control-plane):
#   kubectl -n dev get pods,svc,ing
#   kubectl -n ingress-nginx port-forward svc/ingress-nginx-controller 18080:80
#   curl -i http://127.0.0.1:18080/
#   curl -i http://127.0.0.1:18080/api

apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ealen/echo-server:latest
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: dev
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring
  template:
    metadata:
      labels:
        app: spring
    spec:
      containers:
        - name: spring
          image: ealen/echo-server:latest
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: spring
  namespace: dev
spec:
  selector:
    app: spring
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dev-ing
  namespace: dev
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: spring
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
