name: Backend CI

on:
  workflow_dispatch: # 수동 실행
  pull_request:
    branches: [develop, main, release]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md" # 문서 변경 무시
      - ".github/**" # 워크플로우 변경 무시
      - ".git*" # Git 설정 변경 무시

permissions:
  id-token: write # AWS OIDC 인증에 필요
  contents: read # GitHub 저장소 접근 권한

env:
  AWS_REGION: ap-northeast-2
  # ECR repository name
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'scuad-backend' }}
  # PR이면 base.ref(타겟 브랜치), push면 ref_name(브랜치)
  TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}

jobs:
  # ----------------------------
  # 1. Build (테스트 제외)
  # ----------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ steps.build.outputs.jar_name }}
      jar_path: ${{ steps.build.outputs.jar_path }}
      version: ${{ steps.build.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: gradle

      - name: Build (no test)
        id: build
        run: |
          # 버전 추출
          RAW_VERSION=$(./gradlew properties -q | grep "^version:" | awk '{print $2}')

          # 타겟 브랜치 결정 (PR: base_ref, 수동실행: ref_name)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET_BRANCH="${{ github.ref_name }}"
          else
            TARGET_BRANCH="${{ github.base_ref }}"
          fi

          # main 브랜치면 SNAPSHOT 제거
          if [[ "$TARGET_BRANCH" == "main" ]]; then
            VERSION=${RAW_VERSION%-SNAPSHOT}
            ./gradlew build -x test -PreleaseVersion=$VERSION
          else
            VERSION=$RAW_VERSION
            ./gradlew build -x test
          fi

          JAR_PATH=$(ls build/libs/*.jar | grep -v plain)
          JAR_NAME=$(basename $JAR_PATH)
          echo "jar_path=$JAR_PATH" >> $GITHUB_OUTPUT
          echo "jar_name=$JAR_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload jar 
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.jar_name }}
          path: ${{ steps.build.outputs.jar_path }}
          retention-days: 1

  # ----------------------------
  # 2. Test
  # ----------------------------
  test:
    name: Test (unit/integration)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: gradle

      - name: test (develop)
        if: github.base_ref == 'develop' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/develop')
        env:
          SPRING_PROFILES_ACTIVE: ${{ vars.SPRING_PROFILES_ACTIVE_TEST }}
        run: ./gradlew test 

      - name: Integration test + JaCoCo (main)
        if: env.TARGET_BRANCH == 'main'
        env:
          COVERAGE_MIN: ${{ vars.COVERAGE_MIN }}
          SPRING_PROFILES_ACTIVE: ${{ vars.SPRING_PROFILES_ACTIVE_TEST }}
        run: ./gradlew integrationTest jacocoTestReport jacocoTestCoverageVerification -PCOVERAGE_MIN=${{ env.COVERAGE_MIN }}

  # ----------------------------
  # 3. Static Analysis
  # ----------------------------
  static_analysis:
    name: Static Analysis (Sonar Cloud)
    runs-on: ubuntu-latest
    needs: test 
    if: github.base_ref == 'develop' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'develop') || github.base_ref == 'release' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'release')

    steps:
      - uses: actions/checkout@v4

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: gradle
      
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Sonar Cloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew build -x test sonar --info

  # ----------------------------
  # 4. docker build & push (develop)
  # ----------------------------
  docker_build_push_develop:
    name: Build & Push Docker image (develop) to ECR
    runs-on: ubuntu-latest
    needs: static_analysis
    if: github.base_ref == 'develop' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'develop')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags 
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          echo "tag_sha=develop-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "tag_latest=develop-latest" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with: 
          context: .
          file: ./dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.tag_sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.tag_latest }}
  
  # ----------------------------
  # 5. docker build & push (release)
  # ----------------------------
  docker_build_push_release:
    name: Build & Push Docker image (release) to ECR
    runs-on: ubuntu-latest
    needs: static_analysis
    if: github.base_ref == 'release' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'release')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags 
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          echo "tag_sha=staging-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "tag_latest=staging-latest" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with: 
          context: .
          file: ./dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.tag_sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.tag_latest }}

  # ----------------------------
  # 6. docker build & push (main)
  # ----------------------------
  docker_build_push_main:
    name: Build & Push Docker image (main) to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.base_ref == 'main' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          echo "tag_sha=main-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "tag_latest=main-latest" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.tag_sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.tag_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max