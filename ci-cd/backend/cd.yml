name: Backend CD

on:
  workflow_dispatch: # 수동 실행
  push:
    branches: [develop, main, release]
    paths-ignore:
      - "**.md"
      - ".github/**"
      - ".git*"

permissions:
  id-token: write # AWS OIDC 인증에 필요
  contents: read
  actions: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'scuad-backend' }}
  TARGET_BRANCH: ${{ github.ref_name }}

jobs:
  deploy:
    name: Deploy to EC2 (private subnet) via SSM 
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Getting deploy target & image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ env.TARGET_BRANCH }}" == "main" ]]; then
            PROFILE="prod"
            ENV_TAG_VALUE="prod"
            COMPOSE_S3_URI="${{ secrets.PROD_COMPOSE_S3_URI }}"
            ENV_PARAM_NAME="${{ secrets.PROD_ENV_PARAM_NAME }}"
            IMAGE_TAG="main-latest"
          elif [[ "${{ env.TARGET_BRANCH }}" == "release" ]]; then
            PROFILE="staging"
            ENV_TAG_VALUE="staging"
            COMPOSE_S3_URI="${{ secrets.STAGING_COMPOSE_S3_URI }}"
            ENV_PARAM_NAME="${{ secrets.STAGING_ENV_PARAM_NAME }}"
            IMAGE_TAG="staging-latest"
          else
            PROFILE="dev"
            ENV_TAG_VALUE="dev"
            COMPOSE_S3_URI="${{ secrets.DEV_COMPOSE_S3_URI }}"
            ENV_PARAM_NAME="${{ secrets.DEV_ENV_PARAM_NAME }}"
            IMAGE_TAG="develop-latest"
          fi

          [[ -n "$COMPOSE_S3_URI" ]] || { echo "::error::COMPOSE_S3_URI is empty"; exit 1; }
          [[ -n "$ENV_PARAM_NAME" ]] || { echo "::error::ENV_PARAM_NAME is empty"; exit 1; }

          {
            echo "profile=$PROFILE"
            echo "environment_tag_value=$ENV_TAG_VALUE"
            echo "compose_s3_uri=$COMPOSE_S3_URI"
            echo "env_param_name=$ENV_PARAM_NAME"
            echo "image_tag=$IMAGE_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy with SSM
        shell: bash
        env:
          ENV_TAG_VALUE: ${{ steps.meta.outputs.environment_tag_value }}
          SPRING_PROFILE: ${{ steps.meta.outputs.profile }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          COMPOSE_S3_URI: ${{ steps.meta.outputs.compose_s3_uri }}
          ENV_PARAM_NAME: ${{ steps.meta.outputs.env_param_name }}
        run: |
          set -eux

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com"
          export ECR_REGISTRY

          PARAM_FILE=$(mktemp)
          python3 - <<'PY' > "$PARAM_FILE"
          import json, os
          cmds = [
            "set -eux",
            f"export AWS_REGION={os.environ['AWS_REGION']}",
            f"export ECR_REGISTRY={os.environ['ECR_REGISTRY']}",
            f"export BACKEND_REPO={os.environ['ECR_REPOSITORY']}",
            f"export BACKEND_TAG={os.environ['IMAGE_TAG']}",
            f"export SPRING_PROFILES_ACTIVE={os.environ['SPRING_PROFILE']}",
            f"export COMPOSE_S3_URI={os.environ['COMPOSE_S3_URI']}",
            f"export ENV_PARAM_NAME={os.environ['ENV_PARAM_NAME']}",
            "mkdir -p /home/ubuntu/backend",
            "cd /home/ubuntu/backend",
            'aws s3 cp "$COMPOSE_S3_URI" ./docker-compose.yml --region "$AWS_REGION"',
            'aws ssm get-parameter --name "$ENV_PARAM_NAME" --with-decryption --query "Parameter.Value" --output text --region "$AWS_REGION" > ./.env',
            "chmod 600 ./.env || true",
            'aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"',
            'docker compose -f ./docker-compose.yml --env-file ./.env pull',
            'docker ps -a --filter "name=^/backend$" --format "{{.ID}} {{.Status}} {{.Image}}" || true',
            'docker rm -f backend || true',
            'docker compose -f ./docker-compose.yml --env-file ./.env down --remove-orphans || true',
            'docker compose -f ./docker-compose.yml --env-file ./.env up -d --remove-orphans',
            'docker ps --filter "name=backend" --format "table {{.Names}}\\t{{.Image}}\\t{{.Status}}"',
          ]
          print(json.dumps({"commands": cmds}))
          PY

          echo "SSM parameters file:"
          cat "$PARAM_FILE"

          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:Environment,Values=${ENV_TAG_VALUE}" "Key=tag:Tier,Values=app" "Key=tag:Role,Values=spring" \
            --document-name "AWS-RunShellScript" \
            --comment "backend deploy via docker compose" \
            --parameters "file://$PARAM_FILE" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM CommandId: $CMD_ID"

          for _ in $(seq 1 120); do
            INVOCATIONS=$(aws ssm list-command-invocations --command-id "$CMD_ID" --details \
              --query 'CommandInvocations[].{InstanceId:InstanceId,Status:Status}' --output json)
            DONE=$(echo "$INVOCATIONS" | python3 -c 'import json,sys; inv=json.load(sys.stdin); print(bool(inv) and all(x.get("Status") in ("Success","Failed","Cancelled","TimedOut") for x in inv))')
            [[ "$DONE" == "True" ]] && break
            sleep 5
          done

          echo "$INVOCATIONS"
          FAIL_COUNT=$(echo "$INVOCATIONS" | python3 -c 'import json,sys; inv=json.load(sys.stdin); print(len([x for x in inv if x.get("Status")!="Success"]))')
          [[ "$FAIL_COUNT" == "0" ]] || { echo "One or more instances failed deploy."; exit 1; }

      - name: Health check with SSM
        id: health_check
        shell: bash
        env:
          ENV_TAG_VALUE: ${{ steps.meta.outputs.environment_tag_value }}
        run: |
          set -eux

          HEALTH_SCRIPT=$(cat <<'SSM'
          #!/usr/bin/env bash
          set -eux

          cd /home/ubuntu/backend

          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 60); do
            CID=$(docker ps --filter "name=backend" -q | head -n 1 || true)

            if [[ -n "${CID:-}" ]]; then
              HEALTH=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$CID" 2>/dev/null || echo "missing")
              if [[ "$HEALTH" == "healthy" ]]; then
                echo "Container health: healthy"
                exit 0
              fi
            else
              HEALTH="missing"
            fi

            # Fallback HTTP check (covers case when healthcheck isn't defined)
            if wget -qO- http://localhost:9101/actuator/health >/dev/null 2>&1; then
              echo "HTTP health: OK"
              exit 0
            fi

            echo "  [$i/60] not healthy yet (docker=$HEALTH). sleeping..."
            sleep 5
          done

          echo "Health check failed. Dumping logs..." >&2
          docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" || true

          CID=$(docker ps --filter "name=backend" -q | head -n 1 || true)
          if [[ -n "${CID:-}" ]]; then
            docker logs --tail 300 "$CID" || true
          else
            echo "backend container not found" >&2
          fi

          exit 1
          SSM
          )

          B64=$(printf '%s' "$HEALTH_SCRIPT" | base64 -w0)
          export B64

          HC_PARAM_FILE=$(mktemp)
          python3 - <<'PY' > "$HC_PARAM_FILE"
          import json, os
          b64 = os.environ["B64"]
          cmds = [
            "set -eux",
            f'printf %s "{b64}" | base64 -d > /tmp/health.sh',
            "chmod 700 /tmp/health.sh",
            # ✅ bash로 강제 실행 (sh에서 [[ ]] 터지는 문제 제거)
            "bash /tmp/health.sh",
          ]
          print(json.dumps({"commands": cmds}))
          PY

          echo "SSM health parameters file:"
          cat "$HC_PARAM_FILE"

          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:Environment,Values=${ENV_TAG_VALUE}" "Key=tag:Tier,Values=app" "Key=tag:Role,Values=spring" \
            --document-name "AWS-RunShellScript" \
            --comment "backend health check" \
            --parameters "file://$HC_PARAM_FILE" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM CommandId: $CMD_ID"

          # Fan-out 완료 대기
          for _ in $(seq 1 120); do
            INVOCATIONS=$(aws ssm list-command-invocations --command-id "$CMD_ID" --details \
              --query 'CommandInvocations[].{InstanceId:InstanceId,Status:Status}' --output json)
            DONE=$(echo "$INVOCATIONS" | python3 -c 'import json,sys; inv=json.load(sys.stdin); print(bool(inv) and all(x.get("Status") in ("Success","Failed","Cancelled","TimedOut") for x in inv))')
            [[ "$DONE" == "True" ]] && break
            sleep 5
          done

          echo "$INVOCATIONS"

          # 인스턴스별 stdout/stderr 출력
          echo "$INVOCATIONS" | python3 -c 'import json,sys; inv=json.load(sys.stdin); print("\n".join(x["InstanceId"] for x in inv))' | while read -r IID; do
            echo "--- Output for $IID ---"
            
            # ✅ Failed인데 stdout/stderr 비는 케이스에서 StatusDetails/ResponseCode가 단서가 됨
            aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$IID" \
              --query '{Status:Status,StatusDetails:StatusDetails,ResponseCode:ResponseCode,StandardOutput:StandardOutputContent,StandardError:StandardErrorContent}' \
              --output json || true
          done

          # 실패가 하나라도 있으면 step 실패
          FAIL_COUNT=$(echo "$INVOCATIONS" | python3 -c 'import json,sys; inv=json.load(sys.stdin); bad=[x for x in inv if x.get("Status") != "Success"]; print(len(bad))')
          if [[ "$FAIL_COUNT" != "0" ]]; then
            echo "One or more instances failed the health check step." >&2
            exit 1
          fi

      - name: Notify Discord - Success
        if: steps.health_check.outcome == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          title: "🚀 [${{ steps.meta.outputs.environment_tag_value }}] 백엔드 배포 성공"

      - name: Notify Discord - Failure
        if: steps.health_check.outcome == 'failure'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          title: "🚨 [${{ steps.meta.outputs.environment_tag_value }}] 백엔드 배포 실패"

      - name: Fail workflow if health check failed
        if: steps.health_check.outcome == 'failure'
        run: exit 1