name: Frontend CI

on:
  workflow_dispatch: # 수동 실행
  pull_request:
    branches: [ develop, main ]
    types: [ opened, synchronize, reopened ]
    paths-ignore:
      - "**.md" # 문서 변경 무시
      - ".github/**" # 워크플로우 변경 무시
      - ".git*" # Git 설정 변경 무시

permissions:
  id-token: write
  contents: write
  actions: readname: Frontend CI

on:
  workflow_dispatch:
  pull_request:
    branches: [ develop, main ]
    types: [ opened, synchronize, reopened ]
    paths-ignore:
      - "**.md"
      - ".github/**"
      - ".git*"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: scuad-frontend

jobs:
  # ----------------------------
  # 1. Build & Push Docker Image
  # ----------------------------
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # AWS Credentials 설정
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # AWS ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 브랜치별 Parameter Store 경로 결정
      - name: Set config
        id: config
        run: |
          BRANCH="${{ github.base_ref || github.ref_name }}"
          if [[ "$BRANCH" == release/* ]]; then
            echo "ssm_env_path=/staging/fe/DOT_ENV" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" == "main" ]; then
            echo "ssm_env_path=/prod/fe/DOT_ENV" >> $GITHUB_OUTPUT
          else
            echo "ssm_env_path=/dev/fe/DOT_ENV" >> $GITHUB_OUTPUT
          fi
          echo "tag_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # Parameter Store에서 .env 가져오기
      - name: Fetch .env from Parameter Store
        run: |
          aws ssm get-parameter \
            --name "${{ steps.config.outputs.ssm_env_path }}" \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text > .env

      # Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # runtime 이미지 빌드 및 push
      - name: Build and push runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.config.outputs.tag_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------
  # 2. Test & Static Analysis
  # ----------------------------
  test_and_lint:
    name: Test & Static Analysis
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.base_ref == 'develop' ||
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'develop')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Integration tests
        run: npm run test:integration
        continue-on-error: true

jobs:
  # ----------------------------
  # 1. Build (테스트 제외)
  # ----------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      build_dir: ${{ steps.meta.outputs.build_dir }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          if [ "${{ github.base_ref }}" == "develop" ]; then
            echo "Building with develop mode..."
            npm run build -- --mode develop
          else
            echo "Building with production mode..."
            npm run build
          fi

      - name: Set metadata (artifact name / dir / version)
        id: meta
        run: |
          BUILD_DIR="dist"
          VERSION=$(node -p "require('./package.json').version")
          ARTIFACT_NAME="fe-${VERSION}-${GITHUB_SHA::7}"

          echo "build_dir=$BUILD_DIR" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.build_dir }}/**
          retention-days: 1


  # ----------------------------
  # 2. Test
  # ----------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Integration/Smoke tests (develop)
        if: ${{ github.base_ref == 'develop' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'develop') }}
        run: npm run test:integration

  # ----------------------------
  # 3. Static Analysis (Lint/Format)
  # ----------------------------
  static_analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.base_ref == 'develop' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'develop')}}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  # ----------------------------
  # 4. develop -> S3 Archive (develop)
  # ----------------------------
  snapshot_archive:
    name: Archive to S3
    runs-on: ubuntu-latest
    needs: [build, test, static_analysis]
    if: github.base_ref == 'develop' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'develop')

    steps:
      - name: Set meta
        id: meta
        run: |
          echo "timestamp=$(TZ='Asia/Seoul' date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: artifact

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-northeast-2

      - name: List dist
        run: ls -la artifact && find artifact -maxdepth 2 -type f | head

      - name: Upload dist to S3
        env:
          BUCKET: ${{ secrets.RELEASE_BUCKET }}
          PREFIX: snapshots/frontend
        run: |
          aws s3 cp artifact/ \
            s3://$BUCKET/$PREFIX/${{ needs.build.outputs.version }}/${{ steps.meta.outputs.timestamp }} \
            --recursive

          # latest 폴더에 덮어쓰기 (최신 스냅샷)
          aws s3 cp artifact/ \
            s3://$BUCKET/$PREFIX/latest/ \
            --recursive

  # ----------------------------
  # 5. Main -> S3 Archive (main)
  # ----------------------------
  main_archive:
    name: Archive to S3
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.base_ref == 'main' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main')

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: artifact

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-northeast-2

      - name: List dist
        run: ls -la artifact && find artifact -maxdepth 2 -type f | head

      - name: Upload dist to S3
        env:
          BUCKET: ${{ secrets.RELEASE_BUCKET }}
          PREFIX: releases/frontend
        run: |
          aws s3 cp artifact/ \
            s3://$BUCKET/$PREFIX/${{ needs.build.outputs.version }} \
            --recursive

          # latest 폴더에 덮어쓰기 (최신 스냅샷)
          aws s3 cp artifact/ \
            s3://$BUCKET/$PREFIX/latest/ \
            --recursive