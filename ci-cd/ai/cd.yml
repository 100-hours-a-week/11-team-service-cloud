name: AI CD

on:
  workflow_dispatch:
  push:
    branches: [develop, 'release/**', main]
    paths-ignore:
      - "**.md"
      - ".github/**"
      - ".git*"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # 1. AWS 인증 + ECR 로그인
      # ----------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ----------------------------
      # 2. 브랜치별 태그 + 환경 결정
      # ----------------------------
      - name: Set deploy config
        id: config
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          BRANCH="${GITHUB_REF_NAME}"

          if [[ "$BRANCH" == release/* ]]; then
            echo "tag_latest=staging-latest" >> $GITHUB_OUTPUT
            echo "tag_sha=staging-${SHA_SHORT}" >> $GITHUB_OUTPUT
            echo "target_env=staging" >> $GITHUB_OUTPUT
            echo "ssm_env_path=/staging/ai/DOT_ENV" >> $GITHUB_OUTPUT
            echo "env_label=STAGING" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" == "main" ]; then
            echo "tag_latest=main-latest" >> $GITHUB_OUTPUT
            echo "tag_sha=main-${SHA_SHORT}" >> $GITHUB_OUTPUT
            echo "target_env=prod" >> $GITHUB_OUTPUT
            echo "ssm_env_path=/prod/ai/DOT_ENV" >> $GITHUB_OUTPUT
            echo "env_label=PROD" >> $GITHUB_OUTPUT
          else
            echo "tag_latest=develop-latest" >> $GITHUB_OUTPUT
            echo "tag_sha=develop-${SHA_SHORT}" >> $GITHUB_OUTPUT
            echo "target_env=dev" >> $GITHUB_OUTPUT
            echo "ssm_env_path=/dev/ai/DOT_ENV" >> $GITHUB_OUTPUT
            echo "env_label=DEV" >> $GITHUB_OUTPUT
          fi

      # ----------------------------
      # 3. Docker Build & Push
      # ----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.config.outputs.tag_latest }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.config.outputs.tag_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------
      # 4. SSM Run Command로 인스턴스 일괄 배포
      # ----------------------------
      - name: Deploy via SSM Run Command
        id: ssm_deploy
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.config.outputs.tag_latest }}"
          REGION="${{ env.AWS_REGION }}"
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          SSM_PATH="${{ steps.config.outputs.ssm_env_path }}"
          TARGET_ENV="${{ steps.config.outputs.target_env }}"

          PARAMS=$(jq -n \
            --arg region "$REGION" \
            --arg registry "$REGISTRY" \
            --arg image "$IMAGE" \
            --arg ssm_path "$SSM_PATH" \
            '{commands: [
              "set -eux",
              "aws ecr get-login-password --region \($region) | docker login --username AWS --password-stdin \($registry)",
              "docker pull \($image)",
              "mkdir -p /opt/scuad",
              "aws ssm get-parameter --name \($ssm_path) --with-decryption --query Parameter.Value --output text --region \($region) > /opt/scuad/.env",
              "chmod 600 /opt/scuad/.env",
              "docker rm -f scuad-ai || true",
              "docker run -d --restart unless-stopped --name scuad-ai --env-file /opt/scuad/.env -p 8000:8000 \($image)"
            ]}')

          TARGETS=$(jq -n --arg env "$TARGET_ENV" \
            '[{"Key":"tag:Role","Values":["ai"]},{"Key":"tag:Environment","Values":[$env]}]')

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "$TARGETS" \
            --parameters "$PARAMS" \
            --timeout-seconds 300 \
            --comment "Deploy AI ${{ steps.config.outputs.tag_sha }}" \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM Command sent: $COMMAND_ID"

      # ----------------------------
      # 5. SSM 명령 완료 대기
      # ----------------------------
      - name: Wait for SSM Command
        run: |
          COMMAND_ID="${{ steps.ssm_deploy.outputs.command_id }}"

          sleep 10

          for i in $(seq 1 20); do
            RESULT=$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --query 'CommandInvocations[*].[InstanceId,Status]' \
              --output text)

            echo "[$i/20] $RESULT"

            TOTAL=$(echo "$RESULT" | wc -l | tr -d ' ')
            PENDING=$(echo "$RESULT" | grep -c -E 'Pending|InProgress|Delayed' || true)
            FAILED=$(echo "$RESULT" | grep -c -E 'Failed|TimedOut|Cancelled' || true)

            if [ "$TOTAL" -eq 0 ]; then
              echo "No instances matched the target tags"
              exit 1
            fi

            if [ "$PENDING" -eq 0 ]; then
              if [ "$FAILED" -gt 0 ]; then
                echo "===== Failed instance logs ====="
                FAILED_IDS=$(echo "$RESULT" | grep -E 'Failed|TimedOut|Cancelled' | awk '{print $1}')
                for IID in $FAILED_IDS; do
                  echo "--- $IID ---"
                  aws ssm get-command-invocation \
                    --command-id "$COMMAND_ID" \
                    --instance-id "$IID" \
                    --output json || echo "(could not fetch logs)"
                done
                echo "Deployment failed on $FAILED instance(s)"
                exit 1
              fi
              echo "All $TOTAL instance(s) deployed successfully"
              exit 0
            fi

            sleep 15
          done

          echo "Deployment timed out"
          exit 1

      # # ----------------------------
      # # ASG Instance Refresh (Blue-Green) - 추후 전환 시 사용
      # # ----------------------------
      # - name: Start Instance Refresh
      #   id: refresh
      #   run: |
      #     REFRESH_ID=$(aws autoscaling start-instance-refresh \
      #       --auto-scaling-group-name "${{ steps.config.outputs.asg_name }}" \
      #       --preferences '{
      #         "MinHealthyPercentage": 100,
      #         "MaxHealthyPercentage": 200,
      #         "InstanceWarmup": 120
      #       }' \
      #       --query 'InstanceRefreshId' \
      #       --output text)
      #     echo "refresh_id=$REFRESH_ID" >> $GITHUB_OUTPUT
      #
      # - name: Wait for Instance Refresh
      #   run: |
      #     ASG_NAME="${{ steps.config.outputs.asg_name }}"
      #     for i in $(seq 1 20); do
      #       STATUS=$(aws autoscaling describe-instance-refreshes \
      #         --auto-scaling-group-name "$ASG_NAME" \
      #         --instance-refresh-ids "${{ steps.refresh.outputs.refresh_id }}" \
      #         --query 'InstanceRefreshes[0].Status' --output text)
      #       echo "[$i/20] Status: $STATUS"
      #       if [ "$STATUS" == "Successful" ]; then exit 0; fi
      #       if [ "$STATUS" == "Failed" ] || [ "$STATUS" == "Cancelled" ]; then exit 1; fi
      #       sleep 30
      #     done
      #     exit 1

      # ----------------------------
      # 6. Discord 알림
      # ----------------------------
      - name: Notify Discord - Success
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          title: "[${{ steps.config.outputs.env_label }}] AI 배포 성공"
          description: |
            Image: `${{ env.ECR_REPOSITORY }}:${{ steps.config.outputs.tag_sha }}`
            SSM Command: `${{ steps.ssm_deploy.outputs.command_id }}`

      - name: Notify Discord - Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          title: "[${{ steps.config.outputs.env_label }}] AI 배포 실패"
          description: |
            Image: `${{ env.ECR_REPOSITORY }}:${{ steps.config.outputs.tag_sha }}`
            SSM Command: `${{ steps.ssm_deploy.outputs.command_id }}`