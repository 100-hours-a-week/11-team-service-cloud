name: AI CI

on:
  workflow_dispatch:
  pull_request:
    branches: [develop, 'release/**']
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - ".github/**"
      - ".git*"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  # ----------------------------
  # 1. Build, Test & Push Docker Image
  # ----------------------------
  build:
    name: Build, Test & Push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # AWS Credentials 설정
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # AWS ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 브랜치별 Parameter Store 경로 결정
      - name: Set config
        id: config
        run: |
          BRANCH="${{ github.base_ref || github.ref_name }}"
          if [[ "$BRANCH" == release/* ]]; then
            echo "ssm_path=/staging/ai/DOT_ENV" >> $GITHUB_OUTPUT
          else
            echo "ssm_path=/dev/ai/DOT_ENV" >> $GITHUB_OUTPUT
          fi
          echo "tag_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # Parameter Store에서 .env 가져오기
      - name: Fetch .env from Parameter Store
        run: |
          aws ssm get-parameter \
            --name "${{ steps.config.outputs.ssm_path }}" \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text > .env

      # Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # dev 이미지 빌드 + 테스트
      - name: Build dev image & run tests
        run: |
          docker buildx build --target dev --load -t ai-test .
          docker run --env-file .env ai-test uv run pytest

      # runtime 이미지 빌드 및 push
      - name: Build and push runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.config.outputs.tag_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------
  # 2. Static Analysis (develop)
  # ----------------------------
  static_analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.base_ref == 'develop' ||
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'develop')

    steps:
      - uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Black (format check)
        run: uv run black --check .

      - name: MyPy (type check)
        run: uv run mypy .
        continue-on-error: true